{% extends "base.html" %}

{% block extrahead %}
  <meta property="og:type" content="website">
  <meta property="og:title" content="{{ config.site_name }}">
  <meta property="og:description" content="{{ config.site_description | e }}">
  <meta property="og:url" content="{{ page.canonical_url | default(config.site_url) }}">
  <meta property="og:image" content="{{ config.site_url }}assets/images/book-cover.jpg">
  <meta property="og:image:width" content="600">
  <meta property="og:image:height" content="800">
  <meta property="og:site_name" content="{{ config.site_name }}">
  <meta property="og:locale" content="en_US">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="{{ config.site_name }}">
  <meta name="twitter:description" content="{{ config.site_description | e }}">
  <meta name="twitter:image" content="{{ config.site_url }}assets/images/book-cover.jpg">
  <meta name="google-site-verification" content="YOUR_VERIFICATION_CODE">
{% endblock %}
