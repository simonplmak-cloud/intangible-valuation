site_name: Intangible Asset Valuation
site_description: Complete implementation of all valuation methodologies from Ascent Partners textbook
site_author: Intangible Valuation Contributors
repo_url: https://github.com/USERNAME/intangible-valuation
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    primary: blue
    accent: indigo
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            show_source: true
            show_root_heading: true
            show_root_full_path: false
            show_signature_annotations: true
            show_category_heading: true
            merge_init_into_class: true
            docstring_style: google
            docstring_section_style: table

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - API Reference:
    - Core Math: api/core.md
    - Approaches: api/approaches.md
    - Income Methods: api/income_methods.md
    - Asset Types: api/asset_types.md
    - Advanced: api/advanced.md
  - MCP Server: mcp.md
  - AI Skills: skills.md
