site_name: Intangible Asset Valuation
site_description: >-
  Python library for intangible asset valuation — patents, brands, goodwill,
  PPA, impairment testing. 124+ functions aligned to ASC 805, IFRS 3, ASC 350.
site_author: Ascent Partners
site_url: https://intangible-valuation.simonmak.com
repo_url: https://github.com/simonplmak-cloud/intangible-valuation
repo_name: simonplmak-cloud/intangible-valuation
edit_uri: edit/main/docs/

theme:
  name: material
  custom_dir: docs/overrides
  logo: assets/images/ascent-logo.png
  favicon: assets/images/ascent-logo.png
  palette:
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Open Sans
    code: Roboto Mono
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
  icon:
    repo: fontawesome/brands/github

extra_css:
  - assets/stylesheets/extra.css

extra:
  analytics:
    provider: google
    property: G-XXXXXXXXXX
  social:
    - icon: fontawesome/brands/linkedin
      link: https://www.linkedin.com/company/ascent-partners-group-
      name: Ascent Partners on LinkedIn
    - icon: fontawesome/brands/github
      link: https://github.com/simonplmak-cloud/intangible-valuation
      name: GitHub Repository
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/intangible-valuation/
      name: PyPI Package
  generator: false

copyright: "© 2026 Ascent Partners Group Ltd, All rights reserved. | Part of the <a href='https://www.amazon.com/Intangible-Asset-Valuation-Comprehensive-Technology/dp/B0FZ8742R1' target='_blank' rel='noopener'>Valuation in Practice Series</a>"

plugins:
  - search
  - privacy
  - mkdocstrings:
      handlers:
        python:
          options:
            show_source: true
            show_root_heading: true
            show_root_full_path: false
            show_signature_annotations: true
            show_category_heading: true
            merge_init_into_class: true
            docstring_style: google
            docstring_section_style: table

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - admonition
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - API Reference:
      - Core Math: api/core.md
      - Approaches: api/approaches.md
      - Income Methods: api/income_methods.md
      - Asset Types: api/asset_types.md
      - Advanced: api/advanced.md
  - Examples:
      - Core Methods: examples/core-methods.md
      - Advanced Methods: examples/advanced-methods.md
      - Industry Models: examples/industry-models.md
  - Chapter Index: chapters.md
  - MCP Server: mcp.md
  - AI Skills: skills.md
